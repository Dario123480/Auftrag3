<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Burger Empire</title>
    <link rel="stylesheet" href="style.css?v=1.4">
</head>
<body>
    <header>
        <a class="logo" href="index.html"><img src="assets/images/logo.jpg" alt="Burger Empire logo"><span>Burger Empire</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="produkte.html">Menu</a>
            <a href="contact.html">Contact</a>
            <a href="login.html" class="active" aria-current="page">Login</a>
        </nav>
    </header>

    <main class="form-wrapper">
        <div class="login-card">
            <h2>Welcome back</h2>
            <form>
                <div class="form-field">
                    <label for="login-email">Email Address</label>
                    <input id="login-email" name="email" type="email" placeholder="Email Address" autocomplete="email" required>
                </div>
                <div class="form-field">
                    <label for="login-password">Password</label>
                    <input id="login-password" name="password" type="password" placeholder="Password" autocomplete="current-password" required>
                </div>
                <button type="submit">Sign In</button>
            </form>
            <p class="forgot-pwd">
                <a href="password-forgot.html">Forgot password?</a>
            </p>
        </div>
    </main>

    <footer>
        <a class="footer-brand" href="index.html"><img src="assets/images/logo.jpg" alt="Burger Empire logo"><span>Burger Empire</span></a>
        <p>&copy; 2026 Burger Empire</p>
    </footer>
</body>
</html>
