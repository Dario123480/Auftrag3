<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Contact | Burger Empire</title><link rel=stylesheet href="style.css?v=1.4"></head><body><header><a class=logo href=index.html>Burger Empire</a><nav><a href=index.html>Home</a> <a href=about.html>About</a> <a href=produkte.html>Menu</a> <a href=contact.html class=active aria-current=page>Contact</a> <a href=login.html>Login</a></nav></header><main class=form-wrapper><div class="login-card contact-card"><h2>Order Or Book</h2><p class=subtitle id=contact-subtitle>Place an order, book a table, or send us a question.</p><form id=contact-form><div class=form-field><label for=contact-request-type>Request Type</label> <select id=contact-request-type name=request_type required><option value=order>Order</option><option value=booking>Booking</option><option value=question>Question</option></select></div><div class=form-field><label for=contact-name>Your Name</label> <input id=contact-name name=name type=text placeholder="Your Name" autocomplete=name required></div><div class=form-field><label for=contact-email>Your Email Address</label> <input id=contact-email name=email type=email placeholder="Your Email Address" autocomplete=email required></div><div class=request-group data-request-group=order><div class=form-field><label for=contact-item>Menu Item</label> <input id=contact-item name=menu_item type=text placeholder="What would you like to order?"></div></div><div class=request-group data-request-group=booking><div class=form-field><label for=contact-guests>Number Of Guests</label> <input id=contact-guests name=guests type=number min=1 placeholder="How many guests?"></div><div class=booking-grid><div class=form-field><label for=contact-date>Preferred Date</label> <input id=contact-date name=booking_date type=date></div><div class=form-field><label for=contact-time>Preferred Time</label> <input id=contact-time name=booking_time type=time></div></div></div><div class=form-field><label for=contact-message>Your Message</label> <textarea id=contact-message name=message placeholder="Tell us what you need..." required></textarea></div><p class=form-feedback id=contact-feedback role=status aria-live=polite hidden></p><p class=form-note>Use this form for orders, table bookings, or general questions.</p><button type=submit id=contact-submit>Send Request</button></form></div></main><footer><p>&copy; 2026 Burger Empire</p></footer><script>(function () {
            const requestType = document.getElementById('contact-request-type');
            const itemField = document.getElementById('contact-item');
            const guestsField = document.getElementById('contact-guests');
            const dateField = document.getElementById('contact-date');
            const timeField = document.getElementById('contact-time');
            const messageField = document.getElementById('contact-message');
            const subtitle = document.getElementById('contact-subtitle');
            const submitButton = document.getElementById('contact-submit');
            const form = document.getElementById('contact-form');
            const feedback = document.getElementById('contact-feedback');
            const groups = Array.from(document.querySelectorAll('[data-request-group]'));
            const params = new URLSearchParams(window.location.search);

            function setGroupVisibility(type) {
                groups.forEach(function (group) {
                    group.classList.toggle('is-hidden', group.dataset.requestGroup !== type);
                });

                itemField.required = type === 'order';
                guestsField.required = type === 'booking';
                dateField.required = type === 'booking';
                timeField.required = type === 'booking';
                feedback.hidden = true;
                feedback.textContent = '';

                if (type === 'order') {
                    subtitle.textContent = 'Send us your order and we will confirm the details with you.';
                    messageField.placeholder = 'Add extras, pickup time, or delivery notes.';
                    submitButton.textContent = 'Place Order';
                } else if (type === 'booking') {
                    subtitle.textContent = 'Book your table and share your preferred time with us.';
                    messageField.placeholder = 'Tell us about the occasion or any special requests.';
                    submitButton.textContent = 'Send Booking Request';
                } else {
                    subtitle.textContent = 'Place an order, book a table, or send us a question.';
                    messageField.placeholder = 'Tell us what you need...';
                    submitButton.textContent = 'Send Message';
                }
            }

            const requestedType = params.get('request');
            const requestedItem = params.get('item');

            if (requestedType && ['order', 'booking', 'question'].includes(requestedType)) {
                requestType.value = requestedType;
            }

            if (requestedItem) {
                itemField.value = requestedItem;
            }

            requestType.addEventListener('change', function () {
                setGroupVisibility(requestType.value);
            });

            form.addEventListener('submit', function (event) {
                event.preventDefault();

                if (!form.reportValidity()) {
                    return;
                }

                const formData = new FormData(form);
                const currentType = formData.get('request_type');
                const name = (formData.get('name') || '').trim();
                const safeName = name || 'guest';
                let confirmationText = 'Your request is ready.';

                if (currentType === 'order') {
                    const item = (formData.get('menu_item') || 'your selection').trim();
                    confirmationText = 'Order request saved for ' + safeName + ': ' + item + '. We will contact you using your email address.';
                } else if (currentType === 'booking') {
                    const guests = formData.get('guests');
                    const date = formData.get('booking_date');
                    const time = formData.get('booking_time');
                    confirmationText = 'Booking request saved for ' + safeName + ' on ' + date + ' at ' + time + ' for ' + guests + ' guest(s).';
                } else {
                    confirmationText = 'Message saved for ' + safeName + '. We will reply by email.';
                }

                form.reset();
                requestType.value = currentType;
                setGroupVisibility(currentType);
                feedback.hidden = false;
                feedback.textContent = confirmationText;
            });

            setGroupVisibility(requestType.value);
        })();</script></body></html>
